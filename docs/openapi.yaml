openapi: 3.0.3
info:
  title: Offroad Booking API
  version: 1.0.0
  description: REST API untuk customer, driver, dan admin pada platform booking wisata offroad.
servers:
  - url: http://127.0.0.1:8000/api/v1
    description: Local development
security:
  - sanctum: []
tags:
  - name: Public
  - name: Auth
  - name: Notifications
  - name: Customer
  - name: Driver
  - name: Admin
paths:
  /health:
    get:
      tags: [Public]
      security: []
      summary: Health check API
      operationId: healthCheck
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /tour-packages:
    get:
      tags: [Public]
      security: []
      summary: Daftar paket wisata aktif
      operationId: listPublicTourPackages
      responses:
        '200':
          $ref: '#/components/responses/Success'
  /tour-packages/{tourPackage}:
    get:
      tags: [Public]
      security: []
      summary: Detail paket wisata
      operationId: showPublicTourPackage
      parameters:
        - $ref: '#/components/parameters/TourPackageId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }
  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /auth/me:
    get:
      tags: [Auth]
      summary: Profil user aktif
      operationId: authMe
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout token aktif
      operationId: logout
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
  /customers/register:
    post:
      tags: [Customer]
      security: []
      summary: Registrasi customer
      operationId: registerCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRegistrationRequest'
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /driver/register:
    post:
      tags: [Driver]
      security: []
      summary: Registrasi driver multipart
      operationId: registerDriver
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, email, phone, password, identity_number, license_number, address, date_of_birth, profile_photo]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                password: { type: string, format: password }
                identity_number: { type: string }
                license_number: { type: string }
                address: { type: string }
                date_of_birth: { type: string, format: date }
                profile_photo: { type: string, format: binary }
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /notifications:
    get:
      tags: [Notifications]
      summary: Inbox notifikasi
      operationId: listNotifications
      parameters:
        - in: query
          name: unread_only
          schema: { type: boolean }
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Tandai semua notifikasi dibaca
      operationId: markAllNotificationsRead
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
  /notifications/{notification}/read:
    patch:
      tags: [Notifications]
      summary: Tandai satu notifikasi dibaca
      operationId: markNotificationRead
      parameters:
        - $ref: '#/components/parameters/NotificationId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }
  /customer/profile:
    get:
      tags: [Customer]
      summary: Profil customer
      operationId: showCustomerProfile
      responses:
        '200': { $ref: '#/components/responses/Success' }
    patch:
      tags: [Customer]
      summary: Perbarui profil customer
      operationId: updateCustomerProfile
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /customer/bookings:
    get:
      tags: [Customer]
      summary: Daftar booking customer
      operationId: listCustomerBookings
      responses:
        '200': { $ref: '#/components/responses/Success' }
    post:
      tags: [Customer]
      summary: Buat booking
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /customer/bookings/{booking}:
    get:
      tags: [Customer]
      summary: Detail booking customer
      operationId: showCustomerBooking
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }
  /customer/bookings/{booking}/payments:
    post:
      tags: [Customer]
      summary: Upload bukti pembayaran
      operationId: submitPayment
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [amount, method, proof]
              properties:
                amount: { type: number, format: double }
                method: { type: string }
                proof: { type: string, format: binary }
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /driver/profile:
    get:
      tags: [Driver]
      summary: Profil driver
      operationId: showDriverProfile
      responses:
        '200': { $ref: '#/components/responses/Success' }
    patch:
      tags: [Driver]
      summary: Perbarui profil driver
      operationId: updateDriverProfile
      requestBody:
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /driver/vehicles:
    get:
      tags: [Driver]
      summary: Daftar kendaraan driver
      operationId: listDriverVehicles
      responses:
        '200': { $ref: '#/components/responses/Success' }
    post:
      tags: [Driver]
      summary: Tambah kendaraan driver
      operationId: createDriverVehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /driver/vehicles/{vehicle}:
    get:
      tags: [Driver]
      summary: Detail kendaraan driver
      operationId: showDriverVehicle
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Driver]
      summary: Perbarui kendaraan driver
      operationId: updateDriverVehicle
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRequest'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Driver]
      summary: Hapus kendaraan driver
      operationId: deleteDriverVehicle
      parameters:
        - $ref: '#/components/parameters/VehicleId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /driver/withdrawals:
    get:
      tags: [Driver]
      summary: Riwayat withdrawal
      operationId: listDriverWithdrawals
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200': { $ref: '#/components/responses/Success' }
    post:
      tags: [Driver]
      summary: Ajukan withdrawal
      operationId: requestWithdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawalRequest'
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /admin/audit-logs:
    get:
      tags: [Admin]
      summary: Daftar audit log
      operationId: listAuditLogs
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /admin/payments/{payment}/verification:
    patch:
      tags: [Admin]
      summary: Verifikasi pembayaran
      operationId: verifyPayment
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [paid, rejected] }
                rejection_reason: { type: string, nullable: true }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    TourPackageId:
      in: path
      name: tourPackage
      required: true
      schema: { type: integer }
    BookingId:
      in: path
      name: booking
      required: true
      schema: { type: integer }
    PaymentId:
      in: path
      name: payment
      required: true
      schema: { type: integer }
    VehicleId:
      in: path
      name: vehicle
      required: true
      schema: { type: integer }
    NotificationId:
      in: path
      name: notification
      required: true
      schema: { type: string, format: uuid }
    PerPage:
      in: query
      name: per_page
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
        device_name: { type: string, example: postman }
    CustomerRegistrationRequest:
      type: object
      required: [name, email, phone, password]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        password: { type: string, format: password }
    BookingRequest:
      type: object
      required: [tour_package_id, tour_date, participant_count]
      properties:
        tour_package_id: { type: integer }
        tour_date: { type: string, format: date }
        participant_count: { type: integer, minimum: 1 }
        notes: { type: string, nullable: true }
    VehicleRequest:
      type: object
      properties:
        name: { type: string }
        plate_number: { type: string }
        brand: { type: string }
        model: { type: string }
        year: { type: integer }
        capacity: { type: integer, minimum: 1 }
        notes: { type: string, nullable: true }
    WithdrawalRequest:
      type: object
      required: [points, bank_name, account_number, account_name]
      properties:
        points: { type: integer, minimum: 100 }
        bank_name: { type: string }
        account_number: { type: string }
        account_name: { type: string }
    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data: { nullable: true }
    ErrorEnvelope:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        errors: { type: object, additionalProperties: true }
  responses:
    Success:
      description: Request berhasil
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SuccessEnvelope' }
    Created:
      description: Resource berhasil dibuat
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SuccessEnvelope' }
    Unauthenticated:
      description: Token tidak tersedia atau tidak valid
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Role atau status user tidak memiliki akses
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource tidak ditemukan atau bukan milik user
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Operasi bertentangan dengan state bisnis saat ini
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ValidationError:
      description: Validasi request gagal
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    TooManyRequests:
      description: Rate limit terlampaui
      headers:
        Retry-After:
          description: Jumlah detik sebelum request boleh dicoba kembali
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
