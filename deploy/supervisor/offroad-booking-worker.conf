[program:offroad-booking-notifications]
process_name=%(program_name)s_%(process_num)02d
command=/usr/bin/php /var/www/offroad-booking-api/artisan queue:work database --queue=notifications,default --sleep=3 --tries=5 --timeout=30 --max-time=3600
numprocs=2
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/offroad-booking-api/storage/logs/queue-worker.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=5
stopwaitsecs=3600
environment=APP_ENV="production"
